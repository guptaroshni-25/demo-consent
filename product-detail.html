<!DOCTYPE html>
<html>
<head>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// ✅ Default consent
gtag('consent', 'default', {
  'analytics_storage': 'denied',
  'ad_storage': 'denied'
});

// ✅ EARLY CONSENT RESTORE (FIX ⭐)
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {
  gtag('consent', 'update', {
    analytics_storage: analytics === "true" ? 'granted' : 'denied',
    ad_storage: ads === "true" ? 'granted' : 'denied'
  });
}
</script>

<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){
  w[l]=w[l]||[];
  w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
  var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';
  j.async=true;
  j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
  f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-KRKZ2WJP');
</script>

<title>Book Detail</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- GTM noscript -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KRKZ2WJP"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>
  <div class="container nav">
    <h1>📚 Book Detail</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
    </nav>
  </div>
</header>

<section>
  <div class="container">
    <div class="product">
      <img id="product-img">
      <div>
        <h2 id="product-name"></h2>
        <p id="product-price"></p>
        <button onclick="addToCart()">Add to Cart</button>
        <button onclick="buyNow()">Buy Now</button>
      </div>
    </div>
  </div>
</section>

<!-- CONSENT BANNER -->
<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label><br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label><br><br>

  <button onclick="acceptAll()">Accept All</button>
  <button onclick="rejectAll()">Reject All</button>
  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>
  <p>© 2026 BookStore</p>
</footer>

<script src="script.js"></script>

<script>
// ✅ PRODUCT DATA LOAD (CORRECT)
window.addEventListener("DOMContentLoaded", function () {
  const params = new URLSearchParams(window.location.search);

  document.getElementById("product-name").innerText = params.get("name");
  document.getElementById("product-price").innerText = "Price: " + params.get("price");
  document.getElementById("product-img").src = params.get("img");
});

</script>

</body>
</html>
