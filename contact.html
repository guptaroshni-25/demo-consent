<!DOCTYPE html>
<html>
<head>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// ✅ Default consent
gtag('consent', 'default', {
  'analytics_storage': 'denied',
  'ad_storage': 'denied'
});

// ✅ EARLY CONSENT RESTORE (FIX ⭐)
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {
  gtag('consent', 'update', {
    analytics_storage: analytics === "true" ? 'granted' : 'denied',
    ad_storage: ads === "true" ? 'granted' : 'denied'
  });
}
</script>

<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){
  w[l]=w[l]||[];
  w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
  var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';
  j.async=true;
  j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
  f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-KRKZ2WJP');
</script>

<title>Contact</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- GTM noscript -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KRKZ2WJP"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>
  <div class="container nav">
    <h1>Contact Us</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
    </nav>
  </div>
</header>

<section>
  <div class="container">
    <h2>Get in Touch</h2>

    <form onsubmit="submitForm(event)">
      <input type="text" placeholder="Name" required><br><br>
      <input type="email" placeholder="Email" required><br><br>
      <button type="submit">Submit</button>
    </form>

  </div>
</section>

<!-- CONSENT BANNER -->
<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label><br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label><br><br>

  <button onclick="acceptAll()">Accept All</button>
  <button onclick="rejectAll()">Reject All</button>
  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>
  <p>© 2026 BookStore</p>
</footer>

<script src="script.js"></script>

<script>
// CONSENT BUTTON LOGIC

function acceptAll() {
  gtag('consent', 'update', {
    analytics_storage: 'granted',
    ad_storage: 'granted'
  });

  localStorage.setItem("analyticsConsent", true);
  localStorage.setItem("adsConsent", true);

  hideBanner();
}

function rejectAll() {
  gtag('consent', 'update', {
    analytics_storage: 'denied',
    ad_storage: 'denied'
  });

  localStorage.setItem("analyticsConsent", false);
  localStorage.setItem("adsConsent", false);

  hideBanner();
}

function savePreferences() {
  const analytics = document.getElementById("analyticsConsent").checked;
  const ads = document.getElementById("adsConsent").checked;

  gtag('consent', 'update', {
    analytics_storage: analytics ? 'granted' : 'denied',
    ad_storage: ads ? 'granted' : 'denied'
  });

  localStorage.setItem("analyticsConsent", analytics);
  localStorage.setItem("adsConsent", ads);

  hideBanner();
}

function hideBanner() {
  document.getElementById("consent-banner").style.display = "none";
}
</script>

</body>
</html>
